<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Cafetería - Productos</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container mt-5">

        <h1 class="text-center mb-4">
            Gestión de Cafetería UNAB 2026
        </h1>

        <div class="mb-3">
            <a href="/crear" class="btn btn-success">
                + Nuevo Producto
            </a>
        </div>

        <table class="table table-bordered table-hover bg-white">

            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Categoría</th>
                    <th>Precio</th>
                    <th>Stock</th>
                    <th>Disponible</th>
                    <th>Acciones</th>
                </tr>
            </thead>

            <tbody>

                {% for producto in productos %}

                <tr>

                    <td>{{ producto[0] }}</td>
                    <td>{{ producto[1] }}</td>
                    <td>{{ producto[2] }}</td>
                    <td>${{ producto[3] }}</td>
                    <td>{{ producto[4] }}</td>

                    <td>
                        {% if producto[5] == 1 %}
                        Sí
                        {% else %}
                        No
                        {% endif %}
                    </td>

                    <td>

                        <a href="/editar/{{ producto[0] }}" class="btn btn-primary btn-sm">
                            Editar
                        </a>

                        <form action="/eliminar/{{ producto[0] }}" method="POST" style="display:inline;">

                            <button class="btn btn-danger btn-sm">
                                Eliminar
                            </button>

                        </form>

                        <form action="/vender/{{ producto[0] }}" method="POST" style="display:inline;">

                            <button class="btn btn-warning btn-sm">
                                Vender
                            </button>

                        </form>

                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</body>

</html>
